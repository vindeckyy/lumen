---
# SolarFlare fork CI.
#
# Runs the fork's own build script (scripts/cachyos-build.sh) on an
# Arch Linux container and exercises the fork-specific test suite.
# Distinct from the upstream ci-archlinux.yml so the fork can run
# independently of LizardByte's central release pipeline.
#
# This workflow is the source of truth for "does the fork build?" --
# the centrally-managed CI workflows depend on the fork's release
# artifacts existing on LizardByte's release pipeline, which they
# never will. This one only depends on the contents of this repo.

name: CI-SolarFlare
permissions: {}

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-solarflare
  cancel-in-progress: true

jobs:
  build_archlinux:
    name: Archlinux (CachyOS fast path)
    runs-on: ubuntu-latest
    container:
      image: archlinux/archlinux:base-devel
      options: --cpus 4 --memory 8g
    env:
      BRANCH: ${{ github.head_ref || github.ref_name }}
    steps:
      - name: Update keyring
        shell: bash
        run: |
          pacman -Syy --disable-download-timeout --needed --noconfirm \
            archlinux-keyring
          pacman -Syu --disable-download-timeout --noconfirm
          pacman -Scc --noconfirm

      - name: Setup builder user
        shell: bash
        run: |
          # Arch prevents running makepkg as root
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers

      - name: Patch makepkg flags
        shell: bash
        run: |
          sed -i 's,#MAKEFLAGS="-j2",MAKEFLAGS="-j$(nproc)",g' /etc/makepkg.conf

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          submodules: recursive

      - name: Run cachyos-build.sh
        shell: bash
        run: |
          # Reconfigure for tests so we get test_sunshine in the build
          # (the script defaults BUILD_TESTS=OFF; flip it on for CI).
          export _CI_BUILD_TESTS=ON
          # The fork build script auto-detects distro from /etc/os-release
          # and runs pacman --needed to install the right package set.
          # We patch the script's cmake call to add -DBUILD_TESTS=ON.
          cp scripts/cachyos-build.sh scripts/cachyos-build.ci.sh
          sed -i 's,-DBUILD_TESTS=OFF,-DBUILD_TESTS=ON,g' scripts/cachyos-build.ci.sh
          chmod +x scripts/cachyos-build.ci.sh
          bash ./scripts/cachyos-build.ci.sh --no-pacman 2>&1 | tee build.log
          echo "::group::install summary"
          bash ./scripts/cachyos-build.ci.sh --no-pacman 2>&1 | tail -25 || true
          echo "::endgroup::"

      - name: Verify fork branding
        shell: bash
        run: |
          echo "=== sunshine --version output ==="
          sunshine --version 2>&1 | tail -10
          echo ""
          echo "=== Must contain fork banner ==="
          if sunshine --version 2>&1 | grep -q 'Fork: SolarFlare'; then
            echo "OK: fork banner present"
          else
            echo "FAIL: fork banner missing"
            exit 1
          fi

      - name: Verify fork config keys parse cleanly
        shell: bash
        run: |
          mkdir -p /tmp/sf-test
          cat > /tmp/sf-test/sunshine.conf <<'EOF'
            min_log_level = debug
            busy_poll_us = 75
            rate_cap_pct = 85
            enet_4mib_buffer = false
            pipewire_latency_ms = 12
            cpu_pinning = false
          EOF
          timeout 1 sunshine /tmp/sf-test/sunshine.conf > /tmp/sf-test/out.log 2>&1 || true
          echo "=== Lines matching the 5 fork keys ==="
          grep -E "config: '(busy_poll_us|rate_cap_pct|enet_4mib_buffer|pipewire_latency_ms|cpu_pinning)'" /tmp/sf-test/out.log
          echo ""
          echo "=== Should NOT have Unrecognized warnings for our keys ==="
          UNREC=$(grep -iE 'Unrecognized.*(busy_poll|rate_cap|enet_4mib|pipewire_latency|cpu_pinning)' /tmp/sf-test/out.log || true)
          if [ -n "$UNREC" ]; then
            echo "FAIL: $UNREC"
            exit 1
          fi
          echo "OK: all 5 fork keys recognised"

      - name: Run unit + integration tests
        shell: bash
        run: |
          cd ~/Solar-Flare/build 2>/dev/null || cd build
          # build_sunshine may be under build/ or build/tests/ depending
          # on where the script installed it.
          for cand in tests/test_sunshine build/tests/test_sunshine; do
            if [ -x "$cand" ]; then
              echo "Found test_sunshine at: $cand"
              "$cand" --gtest_brief=1 2>&1 | tee /tmp/test.log | tail -20
              echo "exit: $?"
              grep -E 'PASSED|FAILED|SKIPPED' /tmp/test.log | tail -5
              break
            fi
          done

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@33016e0ce0a4f9c3e9b41f62890d7c9e6a4e7b15  # v4.1.0
        with:
          name: cachyos-build.log
          path: build.log
          if-no-files-found: ignore